name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (CXX + CUDA)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: 12.4.0
          method: network
          sub-packages: '["nvcc", "cudart"]'

      - name: Show tool versions
        run: |
          cmake --version
          nvcc --version

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DAPATHEIA_BUILD_TESTS=ON
          -DCMAKE_CUDA_ARCHITECTURES=75

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  pre-commit:
    name: Lint (pre-commit)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: clang-tidy,no-commit-to-branch
